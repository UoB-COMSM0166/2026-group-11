<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>White-box Tests</title>
  <style>
    /* Simple test page styles keep white-box results readable outside the main game. */
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
      margin: 0;
      padding: 24px;
    }
    .panel {
      max-width: 1100px;
      margin: 0 auto;
      background: #1f2937;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p, li {
      line-height: 1.6;
      color: #d1d5db;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      margin: 18px 0 24px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }
    button.secondary {
      background: #374151;
    }
    .summary {
      margin: 16px 0;
      padding: 14px 16px;
      border-radius: 12px;
      background: #0f172a;
      font-size: 16px;
    }
    .summary.pass {
      border: 1px solid #10b981;
    }
    .summary.fail {
      border: 1px solid #ef4444;
    }
    .results {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    .case {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 14px 16px;
    }
    .case.pass {
      border-color: #10b981;
    }
    .case.fail {
      border-color: #ef4444;
    }
    .case-title {
      font-weight: 700;
      margin-bottom: 6px;
    }
    code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>White-box Tests</h1>

    <div class="toolbar">
      <button id="runTestsBtn">Run White-box Tests</button>
      <button id="clearBtn" class="secondary">Clear Results</button>
    </div>

    <div id="summary" class="summary">Tests have not been run yet.</div>
    <div id="results" class="results"></div>

    <p>Usage: open <code>whitebox_tests.html</code> directly. It is recommended to open it separately from the main game.</p>
  </div>

  <!-- Test scripts mirror the runtime dependencies needed by whitebox_tests.js. -->
  <script src="p5.js"></script>
  <script src="enemy.js"></script>
  <script src="tower.js"></script>
  <script src="game_systems.js"></script>
  <script src="whitebox_tests.js"></script>
</body>
</html>
